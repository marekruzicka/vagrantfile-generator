apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vagrantfile-generator.secretName" . }}
  namespace: {{ include "vagrantfile-generator.namespace" . }}
  labels:
    {{- include "vagrantfile-generator.labels" . | nindent 4 }}
type: Opaque
stringData:
  # JWT Configuration
  JWT_SECRET: {{ .Values.config.jwt.secret | quote }}
  JWT_ALGORITHM: {{ .Values.config.jwt.algorithm | quote }}
  JWT_EXPIRATION_HOURS: {{ .Values.config.jwt.expirationHours | quote }}

  # Mailgun Configuration
  {{- if .Values.config.mailgun.apiKey }}
  MAILGUN_API_KEY: {{ .Values.config.mailgun.apiKey | quote }}
  {{- end }}
  {{- if .Values.config.mailgun.domain }}
  MAILGUN_DOMAIN: {{ .Values.config.mailgun.domain | quote }}
  {{- end }}
  {{- if .Values.config.mailgun.fromEmail }}
  MAILGUN_FROM_EMAIL: {{ .Values.config.mailgun.fromEmail | quote }}
  {{- end }}

  # OIDC Google
  {{- if .Values.config.oidc.google.clientId }}
  OIDC_GOOGLE_CLIENT_ID: {{ .Values.config.oidc.google.clientId | quote }}
  {{- end }}
  {{- if .Values.config.oidc.google.clientSecret }}
  OIDC_GOOGLE_CLIENT_SECRET: {{ .Values.config.oidc.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.config.oidc.google.clientId }}
  OIDC_GOOGLE_REDIRECT_URI: {{ printf "%s/api/auth/callback/google" (include "vagrantfile-generator.backend.externalUrl" .) | quote }}
  {{- end }}

  # OIDC GitHub
  {{- if .Values.config.oidc.github.clientId }}
  OIDC_GITHUB_CLIENT_ID: {{ .Values.config.oidc.github.clientId | quote }}
  {{- end }}
  {{- if .Values.config.oidc.github.clientSecret }}
  OIDC_GITHUB_CLIENT_SECRET: {{ .Values.config.oidc.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.config.oidc.github.clientId }}
  OIDC_GITHUB_REDIRECT_URI: {{ printf "%s/api/auth/callback/github" (include "vagrantfile-generator.backend.externalUrl" .) | quote }}
  {{- end }}

  # OIDC GitLab
  {{- if .Values.config.oidc.gitlab.clientId }}
  OIDC_GITLAB_CLIENT_ID: {{ .Values.config.oidc.gitlab.clientId | quote }}
  {{- end }}
  {{- if .Values.config.oidc.gitlab.clientSecret }}
  OIDC_GITLAB_CLIENT_SECRET: {{ .Values.config.oidc.gitlab.clientSecret | quote }}
  {{- end }}
  {{- if .Values.config.oidc.gitlab.clientId }}
  OIDC_GITLAB_REDIRECT_URI: {{ printf "%s/api/auth/callback/gitlab" (include "vagrantfile-generator.backend.externalUrl" .) | quote }}
  {{- end }}

  # Rate Limiting
  OTP_RATE_LIMIT_MAX_REQUESTS: {{ .Values.config.rateLimit.maxRequests | quote }}
  OTP_RATE_LIMIT_WINDOW_HOURS: {{ .Values.config.rateLimit.windowHours | quote }}

  # OTP Configuration
  OTP_LENGTH: {{ .Values.config.otp.length | quote }}
  OTP_EXPIRATION_MINUTES: {{ .Values.config.otp.expirationMinutes | quote }}
  OTP_MAX_ATTEMPTS: {{ .Values.config.otp.maxAttempts | quote }}

  # Logging
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
