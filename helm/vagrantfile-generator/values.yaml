# Vagrantfile Generator Helm Chart Values
# =========================================

# -- Global settings
global:
  # -- Image pull secrets for private registries
  imagePullSecrets: []

# -- Backend configuration
backend:
  # -- Container image settings
  image:
    repository: ghcr.io/marekruzicka/vagrantfile-generator-be
    tag: latest
    pullPolicy: IfNotPresent

  # -- Number of replicas (DO NOT CHANGE - backend writes to disk)
  # Backend is not horizontally scalable due to file-based storage
  replicas: 1

  # -- Deployment strategy (Recreate to prevent PVC conflicts)
  strategy:
    type: Recreate

  # -- Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # -- Container port
  port: 8000

  # -- Extra backend environment variables
  env: {}

  # -- Health check settings
  healthCheck:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # -- Persistent volume claim settings
  persistence:
    enabled: true
    # -- Storage class (empty string uses cluster default)
    storageClass: ""
    # -- Access mode
    accessMode: ReadWriteOnce
    # -- Storage size
    size: 1Gi
    # -- Annotations for the PVC
    annotations: {}

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules
  affinity: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext:
    fsGroup: 1001

  # -- Container security context
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# -- Frontend configuration
frontend:
  # -- Container image settings
  image:
    repository: ghcr.io/marekruzicka/vagrantfile-generator-fe
    tag: latest
    pullPolicy: IfNotPresent

  # -- Number of replicas (frontend is stateless, can scale)
  replicas: 1

  # -- Resource requests and limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # -- Container port
  port: 8080

  # -- Health check settings
  healthCheck:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  # -- Node selector
  nodeSelector: {}

  # -- Tolerations
  tolerations: []

  # -- Affinity rules
  affinity: {}

  # -- Pod annotations
  podAnnotations: {}

  # -- Pod security context
  podSecurityContext:
    fsGroup: 1001

  # -- Container security context
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# -- Gateway API configuration
gatewayAPI:
  # -- Existing shared Gateway that allows ListenerSets from this namespace
  parentGateway:
    name: shared-gateway
    namespace: gateway-system
  # -- Public hostname managed by ExternalDNS
  hostname: vagrantfile.app
  # -- ClusterIssuer used by cert-manager to populate the generated TLS Secret
  clusterIssuer: letsencrypt-prod

# -- Application secrets and configuration
config:
  # -- JWT Configuration
  jwt:
    # -- Secret key for JWT signing (min 32 characters)
    # IMPORTANT: Change this in production!
    secret: "change-this-to-a-secure-secret-key-min-32-chars"
    algorithm: HS256
    expirationHours: 24

  # -- Email OTP Configuration (Mailgun)
  mailgun:
    # -- Mailgun API key
    apiKey: ""
    # -- Mailgun domain
    domain: ""
    # -- From email address
    fromEmail: ""

  # -- OIDC Provider Configuration
  oidc:
    # -- Google OAuth
    google:
      clientId: ""
      clientSecret: ""
    # -- GitHub OAuth
    github:
      clientId: ""
      clientSecret: ""
    # -- GitLab OAuth
    gitlab:
      clientId: ""
      clientSecret: ""

  # -- Rate limiting configuration
  rateLimit:
    maxRequests: 5
    windowHours: 1

  # -- OTP configuration
  otp:
    length: 6
    expirationMinutes: 15
    maxAttempts: 3

  # -- Log level (DEBUG, INFO, WARNING, ERROR)
  logLevel: INFO
