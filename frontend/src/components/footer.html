<!--
  Footer Component HTML Structure
  
  This component provides the HTML template for the configurable footer.
  It displays copyright text and navigation links to static pages.
  Uses Alpine.js for reactive behavior and Tailwind CSS for styling.
-->

<footer
  data-testid="footer"
  class="footer-component mt-auto bg-gradient-to-br from-slate-50 dark:from-gray-900 to-blue-50 dark:to-gray-800 border-t-2 border-blue-100 dark:border-gray-700"
  x-data="footerComponent"
  x-init="initializeFooter()"
>
  <div class="app-container py-8">
    <!-- Loading state -->
    <div x-show="loading" class="text-center text-gray-500 dark:text-gray-400">
      <div class="inline-flex items-center">
        <svg
          class="animate-spin -ml-1 mr-3 h-4 w-4 text-gray-500 dark:text-gray-400"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        Loading footer...
      </div>
    </div>

    <!-- Error state -->
    <div x-show="error" class="text-center text-red-600 text-sm">
      <p x-text="errorMessage"></p>
      <button
        @click="retryLoad()"
        class="ml-2 text-red-600 hover:text-red-800 underline"
        x-show="canRetry"
      >
        Retry
      </button>
    </div>

    <!-- Main footer content -->
    <div
      x-show="!loading && !error"
      class="footer-content w-full grid grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-4 sm:gap-6 lg:gap-8"
    >
      <!-- Left: Icon + version -->
      <div class="flex flex-col items-center w-12 sm:w-14 flex-shrink-0 gap-1">
        <img src="/images/icon-tr.png"
             alt="Vagrantfile Generator"
             class="h-10 w-10 flex-shrink-0"
             style="image-rendering: -webkit-optimize-contrast;">
        <p x-show="frontendVersion" class="text-xs text-gray-400 dark:text-gray-500 whitespace-nowrap" x-text="'v' + frontendVersion"></p>
      </div>

      <!-- Center: Copyright text (grows to fill) -->
      <div class="footer-text min-w-0">
        <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed" x-html="copyrightText"></p>
      </div>

      <!-- Right: Navigation links + GitHub icon -->
      <div class="footer-nav w-auto flex-shrink-0 flex items-center justify-end gap-x-3 sm:gap-x-4 justify-self-end">
        <!-- API-driven links (e.g. Privacy) -->
        <nav x-show="navigationLinks.length >= 1" aria-label="Footer navigation" class="flex items-center justify-end gap-x-3 sm:gap-x-4">
          <template x-for="link in navigationLinks" :key="link.pageId">
            <a
              x-show="!link.isExternal"
              :href="link.href"
              :data-page="link.pageId"
              :aria-current="link.pageId === currentPage ? 'page' : null"
              :class="{
                'text-blue-600 font-medium': link.pageId === currentPage,
                'text-gray-500 dark:text-gray-400 hover:text-gray-900': link.pageId !== currentPage
              }"
              class="text-sm transition-colors duration-150 ease-in-out cursor-pointer"
              @click="handleLinkClick($event, link)"
              x-text="link.text"
            ></a>
          </template>
        </nav>
        <!-- Static GitHub link -->
        <a href="https://github.com/marekruzicka/vagrantfile-generator"
           target="_blank" rel="noopener noreferrer"
           class="text-gray-400 dark:text-gray-500 hover:text-gray-700 dark:hover:text-gray-200 transition-colors"
           title="View on GitHub">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <!-- Screen reader announcements -->
  <div
    class="sr-only"
    aria-live="polite"
    x-text="screenReaderAnnouncement"
  ></div>

  <!-- Development/Debug info (only in dev mode) -->
  <div
    x-show="$store.debug && $store.debug.enabled"
    class="bg-yellow-50 dark:bg-yellow-900/20 border-t border-yellow-200 dark:border-yellow-800 px-4 py-2"
  >
    <details class="text-xs text-yellow-800 dark:text-yellow-300">
      <summary class="cursor-pointer">Footer Debug Info</summary>
      <div class="mt-2 space-y-1">
        <div>Files loaded: <span x-text="navigationLinks.length"></span></div>
        <div>Current page: <span x-text="currentPage || 'none'"></span></div>
        <div>Last API call: <span x-text="lastApiCall"></span></div>
        <div>Error count: <span x-text="errorCount"></span></div>
      </div>
    </details>
  </div>

  <!-- Content Modal for internal pages -->
  <div
    x-show="showContentModal"
    x-transition.opacity
    class="modal-overlay"
    aria-labelledby="modal-title"
    role="dialog"
    aria-modal="true"
    x-ref="contentModal"
    tabindex="-1"
    @keydown.escape="closeContentModal()"
  >
    <!-- Background overlay with blur effect -->
    <div
      class="fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm transition-opacity"
      @click="closeContentModal()"
    ></div>

    <!-- Modal panel with app styling -->
    <div class="flex min-h-full items-center justify-center p-4">
      <div
        class="modal-content relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl max-w-3xl w-full max-h-[85vh] overflow-hidden"
        x-transition:enter="ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-4 scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        x-transition:leave="ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
        x-transition:leave-end="opacity-0 translate-y-4 scale-95"
      >
        <!-- Modal header with gradient -->
        <div
          class="card-header bg-gradient-to-r from-blue-50 to-indigo-50 border-b border-gray-200 dark:border-gray-700"
        >
          <div class="flex items-center justify-between">
            <h3
              class="text-xl font-bold text-gray-900 dark:text-gray-100"
              id="modal-title"
              x-text="modalTitle"
            ></h3>
            <button
              @click="closeContentModal()"
              class="text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 transition-colors p-2 rounded-xl hover:bg-white hover:bg-opacity-50"
              aria-label="Close modal"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Modal content with enhanced styling -->
        <div class="card-body overflow-y-auto max-h-[60vh]">
          <div
            class="prose prose-lg prose-blue max-w-none"
            x-html="modalContent"
          ></div>
        </div>

        <!-- Modal actions with app button styling -->
        <div
          class="card-header border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3 bg-gray-50 dark:bg-gray-900"
        >
          <button
            type="button"
            class="btn btn-secondary"
            @click="closeContentModal()"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  </div>
</footer>

<!-- 
  Progressive Enhancement Notes:
  
  Without JavaScript:
  - Footer will show basic copyright text
  - Navigation links will still be functional (if server-rendered)
  - No loading states or interactive features
  
  With JavaScript disabled:
  - Alpine.js directives are ignored
  - Fallback content should be provided by server
  - Basic styling remains via Tailwind classes
  
  Responsive Behavior:
  - Mobile: Stacked layout, navigation below copyright
  - Desktop: Horizontal layout, copyright left, navigation right
  - All touch targets meet minimum 44px requirements
  
  Accessibility:
  - ARIA labels and landmarks
  - Screen reader announcements for dynamic content
  - Keyboard navigation support
  - High contrast support via semantic colors
  - Current page indication for screen readers
-->
