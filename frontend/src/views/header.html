<!-- Sticky Header -->
<header class="sticky-header border-b border-gray-200 dark:border-gray-700">
    <div class="app-container">
        <div class="flex justify-between items-center py-4">
            <div class="flex items-center space-x-4">
                <a @click="showProjects()" class="flex items-center space-x-3 cursor-pointer group">
                    <img src="/images/icon-tr.png" 
                         alt="Vagrantfile Generator Icon" 
                         class="h-15 w-15 transition-transform group-hover:scale-105"
                         style="image-rendering: -webkit-optimize-contrast; width: 60px; height: 60px;">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 group-hover:text-blue-600 transition-colors">Vagrantfile Generator</h1>
                        <p class="text-sm text-gray-600 dark:text-gray-400 group-hover:text-gray-800 transition-colors">Create & manage development environments</p>
                    </div>
                </a>
            </div>
            
            <!-- Header Actions -->
            <div class="flex items-center space-x-3">
                <button x-show="currentView === 'project-detail' && currentProject?.vms?.length > 0" 
                        @click="generateVagrantfile()" 
                        class="btn btn-primary">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                    </svg>
                    Generate Vagrantfile
                </button>
                
                <!-- Show lock indicator when project is ready -->
                <div x-show="currentView === 'project-detail' && currentProject?.deployment_status === 'ready'" 
                     class="inline-flex items-center px-3 py-1 text-sm font-medium text-amber-800 dark:text-amber-300 bg-amber-100 dark:bg-amber-900/40 rounded-lg">
                    <svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path>
                    </svg>
                    Project Locked - Read Only
                </div>
                
                <button x-show="currentView === 'projects'" 
                        @click="openCreateProjectModal()" 
                        class="btn btn-primary">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"></path>
                    </svg>
                    New Project
                </button>
                
                <button x-show="currentView === 'project-detail' && currentProject?.deployment_status !== 'ready'" 
                        @click="openCreateVMModal()" 
                        class="btn btn-success">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"></path>
                    </svg>
                    Add VM
                </button>
                
                <!-- User Profile (Public Mode Only) -->
                <div x-data="{ 
                    isPublicMode: false, 
                    userEmail: '',
                    async init() {
                        if (window.deploymentManager) {
                            this.isPublicMode = await window.deploymentManager.isPublicMode();
                        }
                        if (this.isPublicMode && window.authManager) {
                            const user = window.authManager.getUser();
                            if (user) {
                                this.userEmail = user.email;
                            }
                        }
                    }
                }" 
                x-init="init()"
                x-show="isPublicMode" 
                class="flex items-center space-x-3 px-3 py-2 bg-gray-100 dark:bg-gray-700 rounded-lg">
                    <div class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">
                            <span class="text-white text-sm font-semibold" x-text="userEmail ? userEmail[0].toUpperCase() : 'U'"></span>
                        </div>
                        <span class="text-sm text-gray-700 dark:text-gray-300 font-medium" x-text="userEmail"></span>
                    </div>
                    <button @click="window.authManager.logout()" 
                            class="text-gray-500 dark:text-gray-400 hover:text-red-600 transition-colors"
                            title="Logout">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"></path>
                        </svg>
                    </button>
                </div>
                
                <button @click="window.__theme.toggle()"
                        class="p-3 rounded-xl text-slate-600 dark:text-gray-200 bg-slate-50 dark:bg-gray-700 border border-slate-200 dark:border-gray-600 hover:bg-slate-100 dark:hover:bg-gray-600 transition-all duration-200"
                        aria-label="Toggle dark mode"
                        title="Toggle dark mode">
                    <svg class="w-4 h-4 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
                    </svg>
                    <svg class="w-4 h-4 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                </button>

                <button @click="showSettings()" 
                        class="btn btn-secondary">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path>
                    </svg>
                    Settings
                </button>
            </div>
        </div>
    </div>
</header>
