<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vagrantfile Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4" x-data="loginApp()">
        <!-- Login Card -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Vagrantfile Generator</h1>
                <p class="text-gray-600">Sign in to your account</p>
            </div>

            <!-- Email OTP Form -->
            <div x-show="!otpSent">
                <form @submit.prevent="requestOTP" class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            Email Address
                        </label>
                        <input
                            type="email"
                            id="email"
                            x-model="email"
                            required
                            :disabled="loading || !mailgunConfigured"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:bg-gray-100 disabled:cursor-not-allowed"
                            placeholder="you@example.com"
                        >
                    </div>

                    <!-- Mailgun Not Configured Warning -->
                    <div x-show="!mailgunConfigured" class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                        <div class="flex">
                            <svg class="h-5 w-5 text-yellow-400 mr-2" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                            </svg>
                            <div class="text-sm text-yellow-700">
                                <p class="font-medium">Email OTP authentication is disabled</p>
                                <p class="mt-1">Mailgun API is not configured. Please contact the administrator or use OIDC login options below.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Error Message -->
                    <div x-show="error" class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700" x-text="error"></p>
                    </div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        :disabled="loading || !mailgunConfigured"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed transition"
                    >
                        <span x-show="!loading">Send Login Code</span>
                        <span x-show="loading">Sending...</span>
                    </button>
                </form>
            </div>

            <!-- OTP Verification Form -->
            <div x-show="otpSent">
                <form @submit.prevent="verifyOTP" class="space-y-4">
                    <div class="text-center mb-4">
                        <p class="text-sm text-gray-600">
                            We sent a code to <span class="font-medium" x-text="email"></span>
                        </p>
                        <p class="text-xs text-gray-500 mt-1">
                            Code expires in <span x-text="expiresInMinutes"></span> minutes
                        </p>
                        <!-- Countdown Timer -->
                        <div x-show="timeRemaining > 0" class="mt-2">
                            <p class="text-sm text-gray-600">
                                Time remaining: <span class="font-mono font-medium" x-text="formatTime(timeRemaining)"></span>
                            </p>
                        </div>
                    </div>

                    <div>
                        <label for="code" class="block text-sm font-medium text-gray-700 mb-2">
                            Enter 6-digit code
                        </label>
                        <input
                            type="text"
                            id="code"
                            x-model="otpCode"
                            required
                            maxlength="6"
                            pattern="[0-9]{6}"
                            :disabled="loading"
                            class="w-full px-4 py-2 text-center text-2xl tracking-widest font-mono border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:bg-gray-100"
                            placeholder="000000"
                            autocomplete="off"
                        >
                    </div>

                    <!-- Error Message -->
                    <div x-show="error" class="bg-red-50 border border-red-200 rounded-lg p-4">
                        <p class="text-sm text-red-700" x-text="error"></p>
                    </div>

                    <!-- Verify Button -->
                    <button
                        type="submit"
                        :disabled="loading || otpCode.length !== 6"
                        class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed transition"
                    >
                        <span x-show="!loading">Verify Code</span>
                        <span x-show="loading">Verifying...</span>
                    </button>

                    <!-- Back Button -->
                    <button
                        type="button"
                        @click="resetForm"
                        :disabled="loading"
                        class="w-full text-gray-600 py-2 px-4 rounded-lg hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 disabled:cursor-not-allowed transition"
                    >
                        Use different email
                    </button>
                </form>
            </div>


            <!-- OIDC Options -->
            <div class="mt-6 pt-6 border-t border-gray-200">
                <p class="text-center text-sm text-gray-500 mb-4">Or continue with</p>
                <div class="space-y-2">
                    <button @click="loginWithOIDC('google')" class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="text-sm font-medium text-gray-700">Continue with Google</span>
                    </button>
                    <button @click="loginWithOIDC('github')" class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        <span class="text-sm font-medium text-gray-700">Continue with GitHub</span>
                    </button>
                    <button @click="loginWithOIDC('gitlab')" class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path fill="#FC6D26" d="M23.546 10.93L13.067.452a1.01 1.01 0 00-1.428 0L1.16 10.93a1.01 1.01 0 000 1.428l10.48 10.478a1.01 1.01 0 001.428 0l10.478-10.478a1.01 1.01 0 000-1.428"/>
                        </svg>
                        <span class="text-sm font-medium text-gray-700">Continue with GitLab</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-sm text-gray-500">
            <p>Vagrantfile Generator &copy; 2025</p>
        </div>
    </div>

    <script src="../../js/login.js"></script>
</body>
</html>
