# Update FE_LISTEN_URL to set your frontend URL
# Uncomment volumes section to persist backend data

version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vagrantfile-backend:prod
    container_name: vagrantfile-be-prod
    env_file:
      - .env
    ports:
      - "8000:8000"
    # volumes:
    #   - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: vagrantfile-frontend:prod
    container_name: vagrantfile-fe-prod
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

# volumes:
#   backend-data:

networks:
  default:
    name: vagrantfile-net
