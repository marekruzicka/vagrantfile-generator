# Update FE_LISTEN_URL to set your frontend URL
# Uncomment volumes section to persist backend data

version: '3.9'

x-common-variables: &common-variables
  FE_LISTEN_URL: http://notas.lan:8080

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vagrantfile-backend:prod
    container_name: vagrantfile-be-prod
    # ports:
    #   - "8000:8000"
    environment:
      <<: *common-variables
      CORS_ORIGINS: ${FE_LISTEN_URL}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-self-hosted}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required in production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_FROM_EMAIL: ${MAILGUN_FROM_EMAIL:-}
      OIDC_GOOGLE_CLIENT_ID: ${OIDC_GOOGLE_CLIENT_ID:-}
      OIDC_GOOGLE_CLIENT_SECRET: ${OIDC_GOOGLE_CLIENT_SECRET:-}
      OIDC_GOOGLE_REDIRECT_URI: ${OIDC_GOOGLE_REDIRECT_URI:-}
      OIDC_GITHUB_CLIENT_ID: ${OIDC_GITHUB_CLIENT_ID:-}
      OIDC_GITHUB_CLIENT_SECRET: ${OIDC_GITHUB_CLIENT_SECRET:-}
      OIDC_GITHUB_REDIRECT_URI: ${OIDC_GITHUB_REDIRECT_URI:-}
      OIDC_GITLAB_CLIENT_ID: ${OIDC_GITLAB_CLIENT_ID:-}
      OIDC_GITLAB_CLIENT_SECRET: ${OIDC_GITLAB_CLIENT_SECRET:-}
      OIDC_GITLAB_REDIRECT_URI: ${OIDC_GITLAB_REDIRECT_URI:-}
      OTP_RATE_LIMIT_MAX_REQUESTS: ${OTP_RATE_LIMIT_MAX_REQUESTS:-5}
      OTP_RATE_LIMIT_WINDOW_HOURS: ${OTP_RATE_LIMIT_WINDOW_HOURS:-1}
      OTP_LENGTH: ${OTP_LENGTH:-6}
      OTP_EXPIRATION_MINUTES: ${OTP_EXPIRATION_MINUTES:-15}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    # volumes:
    #   - backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 3s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: vagrantfile-frontend:prod
    container_name: vagrantfile-fe-prod
    environment:
      <<: *common-variables
      FRONTEND_API_URL: ${FRONTEND_API_URL:-/api}
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080"]
      interval: 3s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

# volumes:
#   backend-data:

networks:
  default:
    name: vagrantfile-net
