# Docker Compose file for Vagrantfile Generator
# Compatible with both Docker and Podman
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: vagrantfile-backend:dev
    container_name: vagrantfile-be-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # - ./backend/data:/app/data
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--no-access-log"]
    environment:
      - PYTHONPATH=/app
      - CORS_ORIGINS=http://localhost:5173
      - DEPLOYMENT_MODE=self-hosted
      - JWT_SECRET=dev-secret-key-change-in-production-min-32-chars
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - MAILGUN_API_KEY=${MAILGUN_API_KEY:-}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
      - MAILGUN_FROM_EMAIL=${MAILGUN_FROM_EMAIL:-noreply@localhost}
      - OIDC_GOOGLE_CLIENT_ID=${OIDC_GOOGLE_CLIENT_ID:-}
      - OIDC_GOOGLE_CLIENT_SECRET=${OIDC_GOOGLE_CLIENT_SECRET:-}
      - OIDC_GOOGLE_REDIRECT_URI=${OIDC_GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/callback/google}
      - OIDC_GITHUB_CLIENT_ID=${OIDC_GITHUB_CLIENT_ID:-}
      - OIDC_GITHUB_CLIENT_SECRET=${OIDC_GITHUB_CLIENT_SECRET:-}
      - OIDC_GITHUB_REDIRECT_URI=${OIDC_GITHUB_REDIRECT_URI:-http://localhost:8000/api/auth/callback/github}
      - OIDC_GITLAB_CLIENT_ID=${OIDC_GITLAB_CLIENT_ID:-}
      - OIDC_GITLAB_CLIENT_SECRET=${OIDC_GITLAB_CLIENT_SECRET:-}
      - OIDC_GITLAB_REDIRECT_URI=${OIDC_GITLAB_REDIRECT_URI:-http://localhost:8000/api/auth/callback/gitlab}
      - BASE_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:5173
      - OTP_RATE_LIMIT_MAX_REQUESTS=5
      - OTP_RATE_LIMIT_WINDOW_HOURS=1
      - OTP_LENGTH=6
      - OTP_EXPIRATION_MINUTES=15
      - OTP_MAX_ATTEMPTS=3
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 3s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile-dev
    image: vagrantfile-frontend:dev
    container_name: vagrantfile-fe-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Prevent host node_modules from overriding container ones
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_BROWSER_API_URL=http://localhost:8000
      - VITE_ALLOWED_HOSTS=localhost
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1"]
      interval: 3s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

networks:
  default:
    name: vagrantfile-net-dev
