services:
  backend:
    image: ghcr.io/marekruzicka/vagrantfile-generator-be:latest
    environment:
      DEPLOYMENT_MODE: self-hosted
      CORS_ORIGINS: http://localhost:8080
      FRONTEND_URL: http://localhost:8080
      BASE_URL: http://localhost:8000
      JWT_SECRET: local-compose-jwt-secret-change-this-min-32-chars
      SESSION_COOKIE_SECRET: local-compose-session-cookie-secret-change-this-min-32-chars
    volumes:
      - backend-data:/app/data

  frontend:
    image: ghcr.io/marekruzicka/vagrantfile-generator-fe:latest
    environment:
      FRONTEND_API_URL: /api
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  backend-data:
